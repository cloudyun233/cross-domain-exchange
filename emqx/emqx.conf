# EMQX 5.x configuration for the cross-domain exchange project

node {
  name = "cross-domain-emqx@emqx.local"
  cookie = "cross-domain-exchange-secret-cookie-2024"
  data_dir = "/opt/emqx/data"
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024000
}

listeners.ssl.default {
  bind = "0.0.0.0:8883"
  max_connections = 512000
  ssl_options {
    keyfile = "/opt/emqx/etc/certs/key.pem"
    certfile = "/opt/emqx/etc/certs/cert.pem"
    verify = verify_none
  }
}

listeners.quic.default {
  bind = "0.0.0.0:14567"
  max_connections = 512000
  ssl_options {
    keyfile = "/opt/emqx/etc/certs/key.pem"
    certfile = "/opt/emqx/etc/certs/cert.pem"
  }
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 512000
}

dashboard {
  listeners {
    http {
      bind = "0.0.0.0:18083"
      max_connections = 512
    }
  }
}

authentication = [
  {
    mechanism = jwt
    from = password
    use_jwks = false
    algorithm = "hmac-based"
    secret = "cross-domain-exchange-secret-key-2024-jwt-token-generation"
  }
]

authorization {
  no_match = deny
  deny_action = ignore
  cache {
    enable = true
    max_size = 1024
    ttl = 1m
  }
  sources = [
    {
      type = built_in_database
      enable = true
    }
  ]
}
