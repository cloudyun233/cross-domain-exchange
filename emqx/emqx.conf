# =============================================================================
# EMQX 5.x 配置文件 - 跨域交换项目
# =============================================================================
# 此配置文件用于设置 EMQX MQTT 消息服务器的各项参数
# 包括节点配置、监听器、认证和授权等核心功能
# =============================================================================

# -----------------------------------------------------------------------------
# 节点配置
# -----------------------------------------------------------------------------
# 配置 EMQX 节点的基本信息，包括节点名称、集群 cookie 和数据目录
node {
  # 节点名称：格式为 "节点名@主机名"，用于在集群中标识此节点
  name = "cross-domain-emqx@emqx.local"
  
  # Cookie：用于集群节点间的安全通信，所有集群节点必须使用相同的 cookie
  cookie = "cross-domain-exchange-secret-cookie-2024"
  
  # 数据目录：EMQX 存储运行时数据的目录路径
  data_dir = "/opt/emqx/data"
}

# -----------------------------------------------------------------------------
# TCP 监听器配置
# -----------------------------------------------------------------------------
# 标准 MQTT 协议监听器，使用非加密 TCP 连接
# 端口 1883 是 MQTT 协议的标准端口
listeners.tcp.default {
  # 绑定地址和端口：0.0.0.0 表示监听所有网络接口
  bind = "0.0.0.0:1883"
  
  # 最大连接数：允许的最大并发客户端连接数量
  max_connections = 1024000
}

# -----------------------------------------------------------------------------
# SSL/TLS 监听器配置
# -----------------------------------------------------------------------------
# 加密的 MQTT 协议监听器，使用 SSL/TLS 保护通信安全
# 端口 8883 是 MQTT over SSL 的标准端口
listeners.ssl.default {
  # 绑定地址和端口
  bind = "0.0.0.0:8883"
  
  # 最大连接数
  max_connections = 512000
  
  # SSL/TLS 选项配置
  ssl_options {
    # 私钥文件路径：SSL 证书的私钥文件
    keyfile = "/opt/emqx/etc/certs/key.pem"
    
    # 证书文件路径：SSL 证书的公钥文件
    certfile = "/opt/emqx/etc/certs/cert.pem"
    
    # 客户端证书验证模式：
    # verify_none - 不验证客户端证书（仅服务器验证）
    # verify_peer - 验证客户端证书（双向认证）
    verify = verify_none
  }
}

# -----------------------------------------------------------------------------
# QUIC 监听器配置
# -----------------------------------------------------------------------------
# 基于 QUIC 协议的监听器，提供更低的连接延迟和更好的网络性能
# 适用于高延迟或不稳定的网络环境
listeners.quic.default {
  # 绑定地址和端口
  bind = "0.0.0.0:14567"
  
  # 最大连接数
  max_connections = 512000
  
  # SSL/TLS 选项配置（QUIC 内置加密）
  ssl_options {
    # 私钥文件路径
    keyfile = "/opt/emqx/etc/certs/key.pem"
    
    # 证书文件路径
    certfile = "/opt/emqx/etc/certs/cert.pem"
  }
}

# -----------------------------------------------------------------------------
# WebSocket 监听器配置
# -----------------------------------------------------------------------------
# WebSocket 协议监听器，允许通过 Web 浏览器建立 MQTT 连接
# 适用于 Web 应用和移动端应用
# listeners.ws.default {
#   # 绑定地址和端口
#   bind = "0.0.0.0:8083"
  
#   # 最大连接数
#   max_connections = 512000
# }

# -----------------------------------------------------------------------------
# 管理控制台配置
# -----------------------------------------------------------------------------
# EMQX 的 Web 管理界面，用于监控和管理 MQTT 服务器
# 可通过浏览器访问 http://localhost:18083 查看
dashboard {
  listeners {
    http {
      # 绑定地址和端口
      bind = "0.0.0.0:18083"
      
      # 最大连接数：管理控制台的并发连接限制
      max_connections = 512
    }
  }
}

# -----------------------------------------------------------------------------
# 认证配置
# -----------------------------------------------------------------------------
# 配置客户端连接时的身份验证机制
# 支持多种认证方式：JWT、LDAP、MySQL、Redis 等
authentication = [
  {
    # 认证机制：JWT（JSON Web Token）
    mechanism = jwt
    
    # 认证数据来源：从密码字段获取
    from = password
    
    # 是否使用 JWKS（JSON Web Key Set）：false 表示使用本地密钥
    use_jwks = false
    
    # 签名算法：基于 HMAC 的对称加密算法
    algorithm = "hmac-based"
    
    # 密钥：用于生成和验证 JWT 令牌的密钥
    # 注意：生产环境中应使用更安全的密钥管理方式
    secret = "cross-domain-exchange-secret-key-2026-jwt-token-generation"
  }
]

# -----------------------------------------------------------------------------
# MQTT 会话与离线消息配置（使用默认值）
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# 授权配置
# -----------------------------------------------------------------------------
# 配置客户端通过认证后的权限控制
# 决定客户端可以访问哪些主题（Topic）以及执行什么操作（发布/订阅）
authorization {
  # 无匹配规则时的默认操作：deny 表示默认拒绝所有访问
  no_match = deny
  
  # 拒绝访问时的处理方式：ignore 表示忽略并拒绝，不返回错误
  deny_action = ignore
  
  # 授权缓存配置：提高权限验证性能
  cache {
    # 启用缓存
    enable = true
    
    # 缓存最大条目数
    max_size = 1024
    
    # 缓存生存时间：1 分钟后过期
    ttl = 1m
  }
  
  # 授权数据源配置
  sources = [
    {
      # 数据源类型：使用 EMQX 内置数据库
      type = built_in_database
      
      # 启用此数据源
      enable = true
    }
  ]
}
