# EMQX 5.8.0 配置文件
# 跨域数据交换系统专用配置

# 监听器配置
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024000
}

listeners.ssl.default {
  bind = "0.0.0.0:8883"
  max_connections = 512000
  ssl_options {
    keyfile = "/opt/emqx/etc/certs/key.pem"
    certfile = "/opt/emqx/etc/certs/cert.pem"
    verify = verify_none
  }
}

listeners.quic.default {
  bind = "0.0.0.0:14567"
  max_connections = 512000
  ssl_options {
    keyfile = "/opt/emqx/etc/certs/key.pem"
    certfile = "/opt/emqx/etc/certs/cert.pem"
  }
}

# 认证配置
authentication {
  enable = true
  authenticators = [
    {
      mechanism = password_based
      backend = built_in_database
      user_id_type = username
    }
  ]
}

# ACL授权配置
authorization {
  enable = true
  no_match = deny
  deny_action = ignore
  cache {
    enable = true
    max_size = 1024
    ttl = 1m
  }
  sources = [
    {
      type = file
      enable = true
      path = "/opt/emqx/etc/acl.conf"
    }
  ]
}

# 持久化配置
sysmon {
  vm {
    process_check_interval = 30s
    busy_port = true
    busy_dist_port = true
    long_schedule = 240ms
    long_gc = 500ms
    large_heap = 32MB
  }
}

# 消息持久化
durable_storage {
  messages {
    enable = true
  }
  sessions {
    enable = true
  }
}

# 规则引擎
rule_engine {
  rules = []
}

# 日志配置
log {
  console_handlers.default {
    level = info
  }
  file_handlers.default {
    level = info
    file = "log/emqx.log"
  }
}
