# EMQX 5.x 配置文件
# 跨域数据交换系统专用配置

# ==================== 监听器配置 ====================

node {
  name = "cross-domain-emqx@emqx.local"
}
# TCP监听
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024000
}

# TLS/SSL监听
listeners.ssl.default {
  bind = "0.0.0.0:8883"
  max_connections = 512000
  ssl_options {
    keyfile = "/opt/emqx/etc/certs/key.pem"
    certfile = "/opt/emqx/etc/certs/cert.pem"
    verify = verify_none
  }
}

# QUIC监听
listeners.quic.default {
  bind = "0.0.0.0:14567"
  max_connections = 512000
  ssl_options {
    keyfile = "/opt/emqx/etc/certs/key.pem"
    certfile = "/opt/emqx/etc/certs/cert.pem"
  }
}

# WebSocket监听 (后端SSE代理; 保留用于调试)
listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 512000
}

# ==================== JWT本地验签认证 ====================
# 论文4.2.1: "Broker无需查询数据库，仅通过验证JWT的加密签名即可确认身份"
authentication = [
  {
    mechanism = jwt
    from = password
    use_jwks = false
    algorithm = "hmac-based"
    secret = "cross-domain-exchange-secret-key-2024-jwt-token-generation"
    verify_claims {
      exp = true
    }
  }
]

# ==================== ACL授权 ====================
# 使用内置数据库, 后端通过EMQX HTTP API实时推送/管理规则
authorization {
  no_match = deny
  deny_action = ignore
  cache {
    enable = true
    max_size = 1024
    ttl = 1m
  }
  sources = [
    {
      type = built_in_database
      enable = true
    }
  ]
}

# ==================== 持久化配置 ====================
durable_storage {
  messages {
    enable = true
  }
  sessions {
    enable = true
  }
}

# ==================== 日志配置 ====================
log {
  console_handlers.default {
    level = info
  }
  file_handlers.default {
    level = info
    file = "log/emqx.log"
  }
}
