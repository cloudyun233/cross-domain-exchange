# ACL 授权配置文件
# 跨域数据交换系统访问控制规则

# 允许管理员订阅和发布所有主题
{allow, {user, "admin"}, all, ["#"]}.

# 允许域1用户访问域1的主题
{allow, {user, "user1"}, subscribe, ["domain-1/#"]}.
{allow, {user, "user1"}, publish, ["domain-1/#"]}.

# 允许域2用户访问域2的主题
{allow, {user, "user2"}, subscribe, ["domain-2/#"]}.
{allow, {user, "user2"}, publish, ["domain-2/#"]}.

# 允许域3用户访问域3的主题
{allow, {user, "user3"}, subscribe, ["domain-3/#"]}.
{allow, {user, "user3"}, publish, ["domain-3/#"]}.

# 允许域4用户访问域4的主题
{allow, {user, "user4"}, subscribe, ["domain-4/#"]}.
{allow, {user, "user4"}, publish, ["domain-4/#"]}.

# 允许所有用户订阅和发布跨域主题
{allow, all, subscribe, ["cross-domain/#"]}.
{allow, all, publish, ["cross-domain/#"]}.

# 默认拒绝所有其他访问
{deny, all}.
