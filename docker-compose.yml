# version: '3.8'

services:
  # EMQX - 云端 MQTT Broker
  emqx:
    image: emqx/emqx-enterprise:5.10.3
    container_name: cross-domain-emqx
    hostname: emqx
    ports:
      - "1883:1883"        # MQTT TCP
      - "8883:8883"        # MQTT TLS
      - "14567:14567/udp"  # MQTT QUIC (UDP)
      - "8083:8083"        # WebSocket
      - "18083:18083"      # Dashboard & HTTP API
    volumes:
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    environment:
      - EMQX_NAME=cross-domain-emqx
    networks:
      - cde-net
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx_ctl", "status"]
      interval: 15s
      timeout: 5s
      retries: 5

  # NanoMQ - QUIC 代理层
  nanomq:
    image: emqx/nanomq:latest-full
    container_name: cross-domain-nanomq
    hostname: nanomq
    volumes:
      - ./nanomq/nanomq.conf:/etc/nanomq/nanomq.conf
      - nanomq-log:/var/log/nanomq
    depends_on:
      emqx:
        condition: service_healthy
    networks:
      - cde-net
    command: ["nanomq", "start", "--conf", "/etc/nanomq/nanomq.conf"]

  # App - 前后端合并服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cross-domain-app
    ports:
      - "8080:8080"    # HTTP API + 前端静态文件
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - MQTT_BROKER_HOST=nanomq
      - EMQX_API_BASE_URL=http://emqx:18083/api/v5
    depends_on:
      nanomq:
        condition: service_started
      emqx:
        condition: service_healthy
    networks:
      - cde-net

networks:
  cde-net:
    name: cross-domain-network
    driver: bridge

volumes:
  emqx-data:
  emqx-log:
  nanomq-log:
