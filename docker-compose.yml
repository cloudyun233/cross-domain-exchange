version: '3.8'

services:
  emqx:
    image: emqx/emqx-enterprise:5.10.3
    container_name: cross-domain-emqx
    ports:
      - "1883:1883"     # MQTT TCP
      - "8883:8883"     # MQTT TLS
      - "14567:14567"   # MQTT QUIC
      - "8083:8083"     # WebSocket
      - "18083:18083"   # Dashboard & HTTP API
    volumes:
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    environment:
      - EMQX_NAME=cross-domain-emqx
      - EMQX_HOST=emqx
    networks:
      - cde-net
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cross-domain-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - MQTT_BROKER_HOST=emqx
      - EMQX_API_BASE_URL=http://emqx:18083/api/v5
    depends_on:
      emqx:
        condition: service_healthy
    networks:
      - cde-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cross-domain-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cde-net

networks:
  cde-net:
    name: cross-domain-network
    driver: bridge

volumes:
  emqx-data:
  emqx-log:
