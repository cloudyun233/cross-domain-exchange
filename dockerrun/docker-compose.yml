services:
  emqx:
    image: emqx/emqx-enterprise:5.10.3
    container_name: cross-domain-emqx
    hostname: emqx
    ports:
      - "1883:1883"
      - "8883:8883"
      - "14567:14567/udp"
      - "8083:8083"
      - "18083:18083"
    volumes:
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf
      - ./emqx/data:/opt/emqx/data
      - ./emqx/log:/opt/emqx/log
    environment:
      - EMQX_NAME=cross-domain-emqx
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx_ctl", "status"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: cross-domain-backend
    hostname: backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      emqx:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cross-domain-frontend
    hostname: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
