server:
  port: 8080

spring:
  application:
    name: cross-domain-exchange
  
  datasource:
    url: jdbc:h2:mem:crossdomaindb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# JWT配置
jwt:
  secret: cross-domain-exchange-secret-key-2024-jwt-token-generation
  expiration: 86400000

# MQTT配置
mqtt:
  broker:
    host: localhost
    tcp-port: 1883
    tls-port: 8883
    quic-port: 14567
    client-id-prefix: cross-domain-exchange
  
  # 重试配置
  retry:
    max-attempts: 5
    initial-delay-ms: 1000
    max-delay-ms: 30000

# 日志配置
logging:
  level:
    com.crossdomain.exchange: DEBUG
    org.springframework.security: DEBUG
