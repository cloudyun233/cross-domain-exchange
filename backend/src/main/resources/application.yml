server:
  port: 8080

spring:
  application:
    name: cross-domain-exchange

  # Spring Profile 配置
  # 本地开发环境: local (默认)
  # Docker 环境: docker
  profiles:
    active: local

  datasource:
    url: jdbc:h2:mem:crossdomaindb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: cross-domain-exchange-secret-key-2026-jwt-token-generation
  expiration: 86400000

# MQTT Broker
mqtt:
  broker:
    host: localhost
    tls-port: 8883
    tcp-port: 1883
    insecure-trust-all: false
    client-id-prefix: cde-backend
    username: admin
    domain-code: admin
    role-type: admin
  retry:
    max-attempts: 5
    initial-delay-ms: 1000
    multiplier: 2.0
    max-delay-ms: 30000
  connect:
    timeout-seconds: 10
  publish:
    timeout-seconds: 5
  subscribe:
    timeout-seconds: 5
  disconnect:
    timeout-seconds: 5

# EMQX HTTP API
emqx:
  api:
    base-url: http://localhost:18083/api/v5
    api-key: c7ad44cbad762a5d
    secret-key: C7C4Eb4yfls9C7Xvtgyql9Ca0liuDXxyccuKPDJJsL4LB
  monitor:
    poll-interval-ms: 5000

# Logging
logging:
  level:
    com.cde: DEBUG
    org.springframework.security: WARN
