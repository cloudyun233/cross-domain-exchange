# NanoMQ 配置文件 - QUIC 桥接到 EMQX
# 用于跨域数据交换系统的 QUIC 代理层

# ============================================
# 本地 MQTT 监听器
# ============================================
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 102400
}

# ============================================
# QUIC 桥接配置
# ============================================
bridges.mqtt.emqx_bridge {
  # QUIC URL (优先使用 QUIC 协议)
  server = "mqtt-quic://emqx:14567"
  
  # MQTT 协议版本 (4 = MQTT 3.1.1)
  proto_ver = 4
  
  # 桥接客户端 ID
  clientid = "nanomq-bridge"
  
  # 使用 admin 身份连接 EMQX
  # 注意: password 字段需要填写长期有效的 JWT Token
  # 获取方式: 启动后端服务后，管理员登录并调用 GET /api/auth/bridge-token
  # 将返回的 token 填入下方 password 字段
  username = "admin"
  password = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1lIjoiSm9obiIsImFkbWluIjp0cnVlLCJleHAiOjE5OTU4OTc2MDAsInN1YiI6ImFkbWluIiwiaWF0IjoxNzc1MTI1MzEwfQ.lBAbiaIqQNSqsw1dQCJhbePWuW7PX08icrjtY7YEoVU"
  
  # 会话配置
  clean_start = false
  keepalive = 60s
  
  # QUIC 特定配置
  quic_keepalive = 120s
  quic_idle_timeout = 120s
  quic_discon_timeout = 20s
  quic_handshake_timeout = 60s
  
  # 启用混合桥接 (QUIC 失败时自动回退到 TCP/TLS)
  hybrid_bridging = true
  
  # 转发规则: 将所有本地消息转发到 EMQX
  forwards = [
    {
      remote_topic = ""
      local_topic = "#"
    }
  ]
  
  # 订阅规则: 从 EMQX 订阅所有主题 (用于下行消息)
  subscription = [
    {
      remote_topic = "#"
      local_topic = ""
      qos = 1
    }
  ]
  
  # 并行处理配置
  max_parallel_processes = 4
  max_send_queue_len = 2048
  max_recv_queue_len = 2048
}

# ============================================
# 日志配置
# ============================================
log {
  level = info
  to = file
  file = "/var/log/nanomq/nanomq.log"
}
